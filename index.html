<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>교과 용어 번역 도우미</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #f5f3ee;
    --surface: #ffffff;
    --surface2: #f0ede6;
    --border: #ddd9d0;
    --text-main: #1a1814;
    --text-sub: #6b6560;
    --text-light: #9e9890;
    --accent: #2d6a4f;
    --accent2: #40916c;
    --accent-light: #d8f3dc;
    --ko: #1a1814;
    --en: #1d3557;
    --de: #7b2d00;
    --shadow: 0 4px 24px rgba(0,0,0,0.08);
    --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text-main);
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow-sm);
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-badge {
    background: var(--accent);
    color: white;
    font-size: 11px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: 0.5px;
  }

  header h1 {
    font-size: 16px;
    font-weight: 500;
    color: var(--text-main);
  }

  /* ── Language selector ── */
  .lang-bar {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .lang-label {
    font-size: 12px;
    color: var(--text-sub);
    margin-right: 4px;
  }

  .lang-btn {
    padding: 6px 14px;
    min-height: 44px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: transparent;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.18s;
    color: var(--text-sub);
  }

  .lang-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  .lang-btn:hover:not(.active) {
    border-color: var(--accent2);
    color: var(--accent2);
  }

  /* ── Stage bar ── */
  .stage-bar {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 10px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .stage-label {
    font-size: 12px;
    color: var(--text-sub);
    font-weight: 500;
    white-space: nowrap;
  }

  .stage-btns {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .stage-btn {
    padding: 5px 14px;
    min-height: 48px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.18s;
    color: var(--text-sub);
    white-space: nowrap;
  }

  .stage-btn.active {
    background: var(--text-main);
    border-color: var(--text-main);
    color: white;
  }

  .stage-btn:hover:not(.active) {
    border-color: var(--text-main);
    color: var(--text-main);
  }

  .stage-desc {
    font-size: 11px;
    color: var(--text-light);
    margin-left: auto;
  }

  /* ── Main layout ── */
  .main {
    max-width: 960px;
    margin: 0 auto;
    padding: 28px 24px;
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: 24px;
    align-items: start;
  }

  /* ── Upload zone ── */
  .upload-zone {
    background: var(--surface);
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 48px 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
  }

  .upload-zone:hover, .upload-zone.dragover {
    border-color: var(--accent);
    background: var(--accent-light);
  }

  .upload-icon {
    font-size: 40px;
    margin-bottom: 12px;
  }

  .upload-zone h3 {
    font-size: 15px;
    font-weight: 500;
    margin-bottom: 6px;
  }

  .upload-zone p {
    font-size: 13px;
    color: var(--text-sub);
  }

  #file-input { display: none; }

  /* ── Text content area ── */
  .content-area {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px 28px;
    min-height: 420px;
    box-shadow: var(--shadow-sm);
    display: none;
  }

  .content-area.visible { display: block; }

  .page-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }

  .page-title {
    font-size: 13px;
    color: var(--text-sub);
    font-weight: 400;
  }

  .page-badge {
    font-size: 11px;
    background: var(--surface2);
    color: var(--text-sub);
    padding: 3px 10px;
    border-radius: 10px;
    border: 1px solid var(--border);
  }

  /* ── Text rendering with tokens ── */
  .text-block {
    font-size: 15px;
    line-height: 2;
    color: var(--text-main);
  }

  .token {
    display: inline;
    cursor: pointer;
    border-radius: 3px;
    padding: 1px 2px;
    transition: background 0.15s;
    position: relative;
  }

  .token:hover {
    background: var(--accent-light);
  }

  .token.has-translation {
    border-bottom: 1.5px dotted var(--accent2);
  }

  /* ── Tooltip ── */
  .tooltip {
    position: fixed;
    background: var(--text-main);
    color: white;
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    font-size: 13px;
    line-height: 1.6;
    max-width: 260px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    z-index: 1000;
    pointer-events: none;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.15s, transform 0.15s;
  }

  .tooltip.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .tooltip-ko {
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 4px;
  }

  .tooltip-translation {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .tooltip-def {
    font-size: 11px;
    color: rgba(255,255,255,0.65);
    line-height: 1.5;
    border-top: 1px solid rgba(255,255,255,0.15);
    padding-top: 6px;
    margin-top: 4px;
  }

  /* ── Side panel ── */
  .side-panel {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .panel-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow-sm);
  }

  .panel-card-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    font-weight: 600;
    color: var(--text-main);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .panel-card-body {
    padding: 14px 18px;
  }

  /* ── Search ── */
  .search-wrap {
    position: relative;
  }

  .search-input {
    width: 100%;
    padding: 9px 14px 9px 36px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: inherit;
    font-size: 13px;
    background: var(--bg);
    color: var(--text-main);
    outline: none;
    transition: border-color 0.15s;
  }

  .search-input:focus {
    border-color: var(--accent);
  }

  .search-icon {
    position: absolute;
    left: 11px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-light);
    font-size: 14px;
  }

  /* ── Vocab list ── */
  .vocab-list {
    max-height: 340px;
    overflow-y: auto;
    margin-top: 10px;
  }

  .vocab-list::-webkit-scrollbar { width: 4px; }
  .vocab-list::-webkit-scrollbar-track { background: transparent; }
  .vocab-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .vocab-item {
    padding: 9px 4px;
    border-bottom: 1px solid var(--surface2);
    cursor: pointer;
    transition: background 0.12s;
    border-radius: 6px;
  }

  .vocab-item:hover { background: var(--surface2); padding-left: 8px; }
  .vocab-item:last-child { border-bottom: none; }

  .vocab-ko {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-main);
  }

  .vocab-trans {
    font-size: 12px;
    color: var(--text-sub);
    margin-top: 2px;
  }

  .vocab-unit-badge {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 8px;
    background: var(--surface2);
    color: var(--text-light);
    border: 1px solid var(--border);
    float: right;
    margin-top: 2px;
  }

  /* ── Demo text area ── */
  .demo-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px 28px;
    box-shadow: var(--shadow-sm);
  }

  .demo-section h2 {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 6px;
  }

  .demo-section .sub {
    font-size: 13px;
    color: var(--text-sub);
    margin-bottom: 20px;
  }

  .demo-text {
    font-size: 15px;
    line-height: 2.6;
    background: var(--bg);
    border-radius: var(--radius-sm);
    padding: 18px 20px;
    border: 1px solid var(--border);
  }

  /* ── Unit filter ── */
  .unit-filter {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }

  .unit-btn {
    padding: 4px 10px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: transparent;
    font-family: inherit;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--text-sub);
  }

  .unit-btn.active {
    background: var(--accent-light);
    border-color: var(--accent2);
    color: var(--accent);
    font-weight: 600;
  }

  /* ── Stats ── */
  .stats-row {
    display: flex;
    gap: 10px;
  }

  .stat-box {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px;
    text-align: center;
  }

  .stat-num {
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
  }

  .stat-label {
    font-size: 11px;
    color: var(--text-sub);
    margin-top: 2px;
  }

  /* ── 수업 시작 바 ── */
  .session-bar {
    background: var(--accent-light);
    border-bottom: 1px solid #b7e4c7;
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  .session-bar.hidden { display: none; }

  .session-info {
    display: flex;
    align-items: center;
    gap: 20px;
    font-size: 13px;
    color: var(--accent);
  }

  .session-count-label { font-weight: 500; }
  .session-count-label strong { font-size: 16px; }
  .session-total { color: var(--text-sub); }

  .session-start-btn {
    min-height: 48px;
    padding: 0 32px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    font-family: inherit;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    white-space: nowrap;
    letter-spacing: 0.5px;
  }

  .session-start-btn:hover { background: var(--accent2); }
  .session-start-btn:active { transform: scale(0.97); }
  .session-start-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  /* ── 토스트 메시지 ── */
  .toast {
    position: fixed;
    bottom: 36px;
    left: 50%;
    transform: translateX(-50%) translateY(0);
    background: var(--text-main);
    color: white;
    padding: 13px 28px;
    border-radius: 28px;
    font-size: 14px;
    font-weight: 500;
    box-shadow: var(--shadow);
    z-index: 300;
    opacity: 1;
    transition: opacity 0.35s, transform 0.35s;
    white-space: nowrap;
    pointer-events: none;
  }

  .toast.hidden {
    opacity: 0;
    transform: translateX(-50%) translateY(12px);
  }

  .toast.toast-error { background: #c0392b; }

  /* ── Responsive ── */
  @media (max-width: 900px) {
    .main {
      grid-template-columns: 1fr 260px;
      gap: 16px;
    }
  }

  @media (max-width: 720px) {
    .main {
      grid-template-columns: 1fr;
      padding: 16px;
    }
    .stage-desc { display: none; }
    .session-info { display: none; }
    .session-start-btn { width: 100%; }
  }

  /* ── 로그인 오버레이 ── */
  .login-overlay {
    position: fixed;
    inset: 0;
    background: rgba(245, 243, 238, 0.96);
    backdrop-filter: blur(4px);
    z-index: 500;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .login-overlay.hidden { display: none; }

  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 40px 36px;
    width: 100%;
    max-width: 400px;
    box-shadow: var(--shadow);
    text-align: center;
  }

  .login-brand {
    display: inline-block;
    background: var(--accent);
    color: white;
    font-size: 12px;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 20px;
    letter-spacing: 0.5px;
  }

  .login-card h2 {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 6px;
    color: var(--text-main);
  }

  .login-sub {
    font-size: 13px;
    color: var(--text-sub);
    margin-bottom: 28px;
  }

  .login-field {
    width: 100%;
    padding: 12px 14px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: inherit;
    font-size: 14px;
    background: var(--bg);
    color: var(--text-main);
    outline: none;
    transition: border-color 0.15s;
    display: block;
    margin-bottom: 10px;
  }

  .login-field:focus { border-color: var(--accent); }

  .login-submit {
    width: 100%;
    padding: 13px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
    margin-top: 4px;
  }

  .login-submit:hover:not(:disabled) { background: var(--accent2); }
  .login-submit:disabled { opacity: 0.6; cursor: not-allowed; }

  .login-error {
    font-size: 13px;
    color: #c0392b;
    margin-top: 12px;
    min-height: 20px;
  }

  /* ── 사용자 정보 (헤더) ── */
  .user-info {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .user-info.hidden { display: none; }

  .user-name-tag {
    font-size: 13px;
    color: var(--text-sub);
    font-weight: 500;
  }

  .logout-btn {
    padding: 5px 12px;
    min-height: 44px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: transparent;
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--text-sub);
  }

  .logout-btn:hover {
    border-color: #c0392b;
    color: #c0392b;
  }
</style>
</head>
<body>

<!-- 토스트 메시지 -->
<div class="toast hidden" id="toast"></div>

<!-- 로그인 오버레이 -->
<div id="login-overlay" class="login-overlay">
  <div class="login-card">
    <span class="login-brand">수학 Ⅳ</span>
    <h2>로그인</h2>
    <p class="login-sub">이메일과 비밀번호를 입력하세요</p>
    <input class="login-field" type="email" id="login-email" placeholder="이메일" autocomplete="email">
    <input class="login-field" type="password" id="login-password" placeholder="비밀번호" autocomplete="current-password">
    <button class="login-submit" id="login-btn" onclick="doLogin()">로그인</button>
    <p class="login-error" id="login-error"></p>
  </div>
</div>

<!-- Tooltip -->
<div class="tooltip" id="tooltip">
  <div class="tooltip-ko" id="tt-ko"></div>
  <div class="tooltip-translation" id="tt-trans"></div>
  <div class="tooltip-def" id="tt-def"></div>
</div>

<!-- Header -->
<header>
  <div class="header-left">
    <span class="logo-badge">수학 Ⅳ</span>
    <h1>교과 용어 번역 도우미</h1>
  </div>
  <div class="lang-bar">
    <span class="lang-label">번역 언어:</span>
    <button class="lang-btn" data-lang="en" onclick="setLang('en')">English</button>
    <button class="lang-btn active" data-lang="de" onclick="setLang('de')">Deutsch</button>
  </div>
  <div class="user-info hidden" id="user-info">
    <span class="user-name-tag" id="user-name"></span>
    <button class="logout-btn" onclick="doLogout()">로그아웃</button>
  </div>
</header>

<!-- Stage bar -->
<div class="stage-bar">
  <span class="stage-label">번역 단계:</span>
  <div class="stage-btns">
    <button class="stage-btn active" data-stage="1" onclick="setStage(1)">1단계 — 전체번역</button>
    <button class="stage-btn" data-stage="2" onclick="setStage(2)">2단계 — 핵심단어 제외</button>
    <button class="stage-btn" data-stage="3" onclick="setStage(3)">3단계 — 핵심단어만</button>
    <button class="stage-btn" data-stage="4" onclick="setStage(4)">4단계 — 번역 없음</button>
  </div>
  <span class="stage-desc" id="stage-desc">모든 텍스트를 번역합니다</span>
</div>

<!-- 수업 시작 바 -->
<div class="session-bar hidden" id="session-bar">
  <div class="session-info">
    <span class="session-count-label">이번 단계 <strong id="stage-session-count">0</strong>/3차시</span>
    <span class="session-total">누적 <strong id="total-session-count">0</strong>차시</span>
  </div>
  <button class="session-start-btn" id="session-start-btn" onclick="startSession()">수업 시작</button>
</div>

<!-- Main -->
<div class="main">

  <!-- Left: content -->
  <div>
    <!-- Demo text -->
    <div class="demo-section">
      <h2>📖 교과서 본문 미리보기</h2>
      <p class="sub">파란 점선 단어를 클릭하면 번역이 표시됩니다. (PDF 업로드 기능은 다음 단계에서 추가됩니다)</p>
      <div class="demo-text" id="demo-text"></div>
    </div>
  </div>

  <!-- Right: side panel -->
  <div class="side-panel">

    <!-- Stats -->
    <div class="panel-card">
      <div class="panel-card-header">📊 용어집 현황</div>
      <div class="panel-card-body">
        <div class="stats-row">
          <div class="stat-box">
            <div class="stat-num" id="stat-total">40</div>
            <div class="stat-label">수학 용어</div>
          </div>
          <div class="stat-box">
            <div class="stat-num" id="stat-inst">20</div>
            <div class="stat-label">학습도구어</div>
          </div>
          <div class="stat-box">
            <div class="stat-num" id="stat-clicked">0</div>
            <div class="stat-label">클릭한 단어</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Vocab search -->
    <div class="panel-card">
      <div class="panel-card-header">🔍 용어 검색</div>
      <div class="panel-card-body">
        <div class="search-wrap">
          <span class="search-icon">🔎</span>
          <input class="search-input" type="text" id="search-input" placeholder="한국어로 검색..." oninput="filterVocab()">
        </div>

function findVocabById(vid) {
  if (!vid) return null;
  return [...VOCAB.수학_용어, ...VOCAB.학습도구어].find(v => v.id === vid) || null;
}

// ── Render demo text ─────────────────────────────────────────────
function renderDemoText() {
  const container = document.getElementById('demo-text');
  container.innerHTML = '';

  DEMO_SENTENCES.forEach((sentence) => {
    const p = document.createElement('p');
    p.style.marginBottom = '8px';

    // 1단계: 완전번역 문장을 통째로 표시
    if (currentStage === 1) {
      const span = document.createElement('span');
      span.textContent = sentence[currentLang + '_full'];
      p.appendChild(span);
      container.appendChild(p);
      return;
    }

    // 2단계: 번역문장 + 수학용어만 한국어로
    if (currentStage === 2) {
      const mixTokens = sentence[currentLang + '_mix'];
      mixTokens.forEach(token => {
        const vocab = findVocabById(token.vid);
        const span = document.createElement('span');
        span.className = 'token' + (token.vid ? ' has-translation' : '');
        span.textContent = token.t;
        if (vocab) {
          span.addEventListener('click', (e) => onTokenClick(e, vocab, token.t));
          span.addEventListener('mouseenter', (e) => showTooltip(e, vocab));
          span.addEventListener('mouseleave', hideTooltip);
        }
        p.appendChild(span);
      });
      container.appendChild(p);
      return;
    }

    // 2~4단계: 어절 단위 토큰으로 표시
    sentence.ko.forEach((token, wi) => {
      const vocab = findVocabById(token.vid);
      const isMathTerm = vocab && VOCAB.수학_용어.includes(vocab);
      const isInstTerm = vocab && VOCAB.학습도구어.includes(vocab);
      const hasVocab = !!vocab;
      const suffix = token.suffix || '';

      const span = document.createElement('span');
      span.className = 'token' + (hasVocab ? ' has-translation' : '');
      span.dataset.word = token.w;

      let displayText;
      if (currentStage === 2) {
        // 수학용어는 한국어 유지, 학습도구어만 번역
        if (isInstTerm) displayText = (vocab[currentLang] || token.w);
        else if (isMathTerm) displayText = vocab.ko + suffix;
        else displayText = token.w;
      } else if (currentStage === 3) {
        // 수학용어만 번역 + 조사 한국어로 유지
        if (isMathTerm) displayText = (vocab[currentLang] || vocab.ko) + suffix;
        else displayText = token.w;
      } else {
        // 4단계: 원문 그대로
        displayText = token.w;
      }

      span.textContent = wi < sentence.ko.length - 1 ? displayText + ' ' : displayText;

      if (hasVocab) {
        span.addEventListener('click', (e) => onTokenClick(e, vocab, token.w));
        span.addEventListener('mouseenter', (e) => showTooltip(e, vocab));
        span.addEventListener('mouseleave', hideTooltip);
      }

      p.appendChild(span);
    });

    container.appendChild(p);
  });
}

// ── Token click ──────────────────────────────────────────────────
function onTokenClick(e, vocab, originalWord) {
  e.stopPropagation();
  clickedWords.add(originalWord);
  document.getElementById('stat-clicked').textContent = clickedWords.size;
  showTooltip(e, vocab);
}

// ── Tooltip ──────────────────────────────────────────────────────
function showTooltip(e, vocab) {
  const tt = document.getElementById('tooltip');
  document.getElementById('tt-ko').textContent = vocab.ko;
  document.getElementById('tt-trans').textContent = vocab[currentLang] || '—';
  const def = vocab.definition_ko || vocab.note || '';
  document.getElementById('tt-def').textContent = def;
  document.getElementById('tt-def').style.display = def ? 'block' : 'none';

  tt.classList.add('visible');
  positionTooltip(e);
}

function positionTooltip(e) {
  const tt = document.getElementById('tooltip');
  const x = e.clientX + 12;
  const y = e.clientY - 10;
  const maxX = window.innerWidth - 280;
  const maxY = window.innerHeight - 140;
  tt.style.left = Math.min(x, maxX) + 'px';
  tt.style.top = Math.min(y, maxY) + 'px';
}

function hideTooltip() {
  document.getElementById('tooltip').classList.remove('visible');
}

document.addEventListener('click', hideTooltip);

// ── Lang / Stage setters ─────────────────────────────────────────
function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.lang === lang);
  });
  renderDemoText();
  renderVocabList();
}

function setStage(stage, saveToDb = true) {
  currentStage = stage;
  document.querySelectorAll('.stage-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.stage) === stage);
  });
  document.getElementById('stage-desc').textContent = STAGE_DESC[stage];
  renderDemoText();
  if (saveToDb && currentUser) {
    stageSessionCount = 0;
    updateSessionDisplay();
    saveStageToDb(stage, 0);
  }
}

// ── Vocab list ───────────────────────────────────────────────────
function renderVocabList() {
  const list = document.getElementById('vocab-list');
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  const all = [...VOCAB.수학_용어, ...VOCAB.학습도구어];

  const filtered = all.filter(v => {
    const unitOk = currentUnit === '전체' || v.unit === currentUnit;
    const searchOk = !q || v.ko.includes(q) || (v[currentLang] || '').toLowerCase().includes(q);
    return unitOk && searchOk;
  });

  list.innerHTML = filtered.map(v => {
    const unitLabel = v.unit ? v.unit.replace('01_','').replace('02_','').replace('03_','').replace(/_/g,' ') : '도구어';
    return `
      <div class="vocab-item" onclick="highlightVocab('${v.ko}')">
        <span class="vocab-unit-badge">${unitLabel.slice(0,4)}</span>
        <div class="vocab-ko">${v.ko}</div>
        <div class="vocab-trans">${v[currentLang] || '—'}</div>
      </div>
    `;
  }).join('');
}

function filterVocab() { renderVocabList(); }

function filterUnit(btn, unit) {
  currentUnit = unit;
  document.querySelectorAll('.unit-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderVocabList();
}

function highlightVocab(ko) {
  // 해당 단어 토큰에 잠깐 하이라이트
  document.querySelectorAll('.token').forEach(t => {
    if (t.dataset.word && t.dataset.word.startsWith(ko)) {
      t.style.background = 'var(--accent-light)';
      t.style.outline = '2px solid var(--accent)';
      setTimeout(() => {
        t.style.background = '';
        t.style.outline = '';
      }, 1200);
    }
  });
}

// ── Supabase 인증 ────────────────────────────────────────────────

async function initSupabase() {
  try {
    const res = await fetch('/api/config');
    if (!res.ok) throw new Error('config 응답 오류');
    const { supabaseUrl, supabaseAnonKey, error } = await res.json();
    if (error) throw new Error(error);

    supabaseClient = window.supabase.createClient(supabaseUrl, supabaseAnonKey);

    // 기존 세션 확인
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (session) {
      await onLoginSuccess(session.user);
    } else {
      showLoginOverlay();
    }

    // 세션 변화 감지 (다른 탭 로그아웃 등)
    supabaseClient.auth.onAuthStateChange(async (event, session) => {
      if (event === 'SIGNED_IN' && session) {
        await onLoginSuccess(session.user);
      } else if (event === 'SIGNED_OUT') {
        currentUser = null;
        document.getElementById('user-info').classList.add('hidden');
        showLoginOverlay();
      }
    });
  } catch {
    showLoginOverlay();
    document.getElementById('login-error').textContent =
      '서버 연결 실패. 환경변수(SUPABASE_URL, SUPABASE_ANON_KEY)를 확인해주세요.';
  }
}

async function onLoginSuccess(user) {
  currentUser = user;
  await loadStudentData(user.id);
  hideLoginOverlay();
}

async function loadStudentData(userId) {
  const { data } = await supabaseClient
    .from('students')
    .select('current_stage, session_count, stage_session_count')
    .eq('user_id', userId)
    .single();

  if (data) {
    setStage(data.current_stage || 1, false);
    sessionCount = data.session_count || 0;
    stageSessionCount = data.stage_session_count || 0;
    updateSessionDisplay();
  }

  document.getElementById('user-name').textContent = currentUser.email;
  document.getElementById('user-info').classList.remove('hidden');
  document.getElementById('session-bar').classList.remove('hidden');
}

async function saveStageToDb(stage, newStageSessionCount) {
  if (!supabaseClient || !currentUser) return;
  const payload = { user_id: currentUser.id, current_stage: stage };
  if (newStageSessionCount !== undefined) payload.stage_session_count = newStageSessionCount;
  await supabaseClient
    .from('students')
    .upsert(payload);
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const errorEl = document.getElementById('login-error');
  const btn = document.getElementById('login-btn');

  errorEl.textContent = '';
  btn.disabled = true;
  btn.textContent = '로그인 중...';

  const { error } = await supabaseClient.auth.signInWithPassword({ email, password });

  if (error) {
    errorEl.textContent = '이메일 또는 비밀번호가 올바르지 않습니다.';
    btn.disabled = false;
    btn.textContent = '로그인';
  }
}

async function doLogout() {
  await supabaseClient.auth.signOut();
}

// ── 수업 시작 / 자동 페이딩 ──────────────────────────────────────

function updateSessionDisplay() {
  document.getElementById('stage-session-count').textContent = stageSessionCount;
  document.getElementById('total-session-count').textContent = sessionCount;
}

async function startSession() {
  if (!supabaseClient || !currentUser) {
    showToast('로그인 상태를 확인해주세요', true);
    return;
  }

  const btn = document.getElementById('session-start-btn');
  btn.disabled = true;

  const newSessionCount = sessionCount + 1;
  let newStage = currentStage;
  let newStageSessionCount;
  let stageAdvanced = false;

  // 현재 단계에서 3차시 이상이고 최고 단계(4)가 아니면 자동 전환
  if (stageSessionCount >= 3 && currentStage < 4) {
    newStage = currentStage + 1;
    newStageSessionCount = 1;
    stageAdvanced = true;
  } else {
    newStageSessionCount = stageSessionCount + 1;
  }

  const { error } = await supabaseClient
    .from('students')
    .upsert({
      user_id: currentUser.id,
      current_stage: newStage,
      session_count: newSessionCount,
      stage_session_count: newStageSessionCount
    });

  if (error) {
    showToast(`저장 오류: ${error.message}`, true);
    btn.disabled = false;
    return;
  }

  sessionCount = newSessionCount;
  stageSessionCount = newStageSessionCount;
  updateSessionDisplay();

  if (stageAdvanced) {
    setStage(newStage, false);
    showToast(`단계가 올라갔어요! 이제 ${newStage}단계예요 🎉`);
  } else {
    showToast('오늘 수업을 시작했어요 👋');
  }

  btn.disabled = false;
}

// ── 토스트 ───────────────────────────────────────────────────────

let toastTimer = null;

function showToast(message, isError = false) {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.classList.remove('hidden', 'toast-error');
  if (isError) toast.classList.add('toast-error');

  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => {
    toast.classList.add('hidden');
    toastTimer = null;
  }, isError ? 5000 : 3000);
}

function showLoginOverlay() {
  document.getElementById('login-overlay').classList.remove('hidden');
}

function hideLoginOverlay() {
  document.getElementById('login-overlay').classList.add('hidden');
}

// ── Init ─────────────────────────────────────────────────────────
renderDemoText();
renderVocabList();

// Enter 키로 로그인
document.getElementById('login-password').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') doLogin();
});
document.getElementById('login-email').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('login-password').focus();
});

initSupabase();
</script>
